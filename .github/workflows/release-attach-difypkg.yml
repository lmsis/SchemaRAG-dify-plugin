# Builds lm_db_schema_rag-{version}.difypkg and uploads it to THIS repo's GitHub Release.
# Dify "Install from GitHub" only lists .difypkg assets on the release — without this step the package dropdown stays empty.
#
# Signing (optional):
#   PLUGIN_SIGNING_PRIVATE_PEM — full PEM of private key (signs the .difypkg in CI)
#   PLUGIN_SIGNING_PUBLIC_PEM  — optional; if set with private, runs `signature verify` before upload
# See docs/PLUGIN_SIGNING.md
#
# CLI 0.0.6 has no `signature` subcommand; pin matches recent daemon releases.
name: Attach difypkg to release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag of an existing release (e.g. v1.0.0) — re-build and re-upload .difypkg"
        required: true
        default: "v1.0.0"

env:
  DIFY_PLUGIN_DAEMON_VERSION: "0.5.4"

jobs:
  attach:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.rel.outputs.tag }}

      - name: Download dify-plugin CLI
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          cd "$RUNNER_TEMP/bin"
          wget -q "https://github.com/langgenius/dify-plugin-daemon/releases/download/${{ env.DIFY_PLUGIN_DAEMON_VERSION }}/dify-plugin-linux-amd64" -O dify-plugin
          chmod +x dify-plugin

      - name: Read plugin name and version from manifest
        id: meta
        run: |
          PLUGIN_NAME=$(grep "^name:" manifest.yaml | head -1 | awk '{print $2}')
          VERSION=$(grep "^version:" manifest.yaml | head -1 | awk '{print $2}')
          echo "plugin_name=$PLUGIN_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building $PLUGIN_NAME $VERSION"

      - name: Package plugin (and sign if secret set)
        id: pack
        env:
          PLUGIN_SIGNING_PRIVATE_PEM: ${{ secrets.PLUGIN_SIGNING_PRIVATE_PEM }}
        run: |
          set -euo pipefail
          PKG="${{ steps.meta.outputs.plugin_name }}-${{ steps.meta.outputs.version }}.difypkg"
          "$RUNNER_TEMP/bin/dify-plugin" plugin package . -o "$PKG"

          if [ -n "${PLUGIN_SIGNING_PRIVATE_PEM:-}" ]; then
            umask 077
            KEYFILE="$RUNNER_TEMP/plugin-signing-private.pem"
            printf '%s\n' "$PLUGIN_SIGNING_PRIVATE_PEM" > "$KEYFILE"
            "$RUNNER_TEMP/bin/dify-plugin" signature sign "$PKG" -p "$KEYFILE"
            rm -f "$KEYFILE"
            SIGNED="${PKG%.difypkg}.signed.difypkg"
            if [ ! -f "$SIGNED" ]; then
              echo "::error::signature sign did not produce $SIGNED"
              exit 1
            fi
            mv -f "$SIGNED" "$PKG"
            echo "::notice::Package was signed in CI (secret PLUGIN_SIGNING_PRIVATE_PEM)."
            echo "was_signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::PLUGIN_SIGNING_PRIVATE_PEM not set — uploading UNSIGNED .difypkg. Dify with FORCE_VERIFYING_SIGNATURE=true will reject it. See docs/PLUGIN_SIGNING.md"
            echo "was_signed=false" >> "$GITHUB_OUTPUT"
          fi

          ls -la "$PKG"
          echo "package=$PKG" >> "$GITHUB_OUTPUT"

      - name: Verify signature before upload (optional)
        if: ${{ steps.pack.outputs.was_signed == 'true' && secrets.PLUGIN_SIGNING_PUBLIC_PEM != '' }}
        env:
          PLUGIN_SIGNING_PUBLIC_PEM: ${{ secrets.PLUGIN_SIGNING_PUBLIC_PEM }}
        run: |
          PKG="${{ steps.pack.outputs.package }}"
          printf '%s\n' "$PLUGIN_SIGNING_PUBLIC_PEM" > "$RUNNER_TEMP/verify.pub.pem"
          "$RUNNER_TEMP/bin/dify-plugin" signature verify "$PKG" -p "$RUNNER_TEMP/verify.pub.pem"
          rm -f "$RUNNER_TEMP/verify.pub.pem"
          echo "signature verify OK for $PKG"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.rel.outputs.tag }}" \
            "${{ steps.pack.outputs.package }}" \
            --repo "${{ github.repository }}" \
            --clobber
