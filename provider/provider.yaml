identity:
  author: lmsis
  name: lm_db_schema_rag
  label:
    en_US: LM DB Schema RAG
    zh_Hans: LM DB Schema RAG
    pt_BR: LM DB Schema RAG
  description:
    en_US: Automatically create database schema knowledge base to build RAGs. Nodes containing natural language to SQL functionality based on schemaRAG
    zh_Hans: 自动创建数据库 schema 知识库以构建 RAG。包含基于 schemaRAG 的自然语言转 SQL 功能的节点。
    pt_BR: Cria automaticamente uma base de conhecimento do esquema do banco para RAG. Inclui nós de linguagem natural para SQL com base no schemaRAG.
  icon: logo.jpg
  tags:
    - business
    - other

credentials_for_provider:
  api_uri:
    type: text-input
    required: true
    label:
      en_US: Dify API URI
      zh_Hans: Dify API 地址
      pt_BR: URI da API Dify
    placeholder:
      en_US: http://localhost/v1
      zh_Hans: http://localhost/v1
      pt_BR: http://localhost/v1
    default: "http://localhost/v1"

  dataset_api_key:
    type: secret-input
    required: true
    label:
      en_US: Dify Dataset API key
      zh_Hans: Dify 知识库 API key
      pt_BR: Chave API do dataset Dify
    placeholder:
      en_US: Please input your Dify Dataset API key
      zh_Hans: 请输入你的 Dify 知识库 API key
      pt_BR: Informe sua chave API do dataset Dify

  db_type:
    type: select
    required: true
    label:
      en_US: Database type
      zh_Hans: 数据库类型
      pt_BR: Tipo de banco de dados
    options:
      - value: mysql
        label:
          en_US: MySQL
          zh_Hans: MySQL
          pt_BR: MySQL
      - value: postgresql
        label:
          en_US: PostgreSQL
          zh_Hans: PostgreSQL
          pt_BR: PostgreSQL
      - value: mssql
        label:
          en_US: Microsoft SQL Server
          zh_Hans: Microsoft SQL Server
          pt_BR: Microsoft SQL Server
      - value: oracle
        label:
          en_US: Oracle
          zh_Hans: Oracle
          pt_BR: Oracle
      - value: dameng
        label:
          en_US: Dameng
          zh_Hans: 达梦数据库
          pt_BR: Dameng
      - value: doris
        label:
          en_US: Apache Doris
          zh_Hans: Apache Doris
          pt_BR: Apache Doris

  db_host:
    type: text-input
    required: true
    label:
      en_US: Database Host
      zh_Hans: 数据库主机
      pt_BR: Host do banco
    placeholder:
      en_US: Database host address
      zh_Hans: 数据库主机地址
      pt_BR: Endereço do host do banco

  db_port:
    type: text-input
    required: true
    label:
      en_US: Database Port
      zh_Hans: 数据库端口
      pt_BR: Database Port
    placeholder:
      en_US: "Please input your database port (MySQL:3306, PostgreSQL:5432, MSSQL:1433, Oracle:1521, Dameng:5236, Doris:9030)"
      zh_Hans: "请输入数据库端口 (MySQL:3306, PostgreSQL:5432, MSSQL:1433, Oracle:1521, 达梦:5236, Doris:9030)"
      pt_BR: "Informe a porta (MySQL:3306, PostgreSQL:5432, MSSQL:1433, Oracle:1521, Dameng:5236, Doris:9030)"
    default: "3306"

  db_user:
    type: text-input
    required: true
    label:
      en_US: Database User
      zh_Hans: 数据库用户名
      pt_BR: Usuário do banco
    placeholder:
      en_US: Database username
      zh_Hans: 数据库用户名
      pt_BR: Nome de usuário do banco

  db_password:
    type: secret-input
    required: true
    label:
      en_US: Database Password
      zh_Hans: 数据库密码
      pt_BR: Senha do banco
    placeholder:
      en_US: Database password
      zh_Hans: 数据库密码
      pt_BR: Senha do banco

  db_name:
    type: text-input
    required: true
    label:
      en_US: Database Name
      zh_Hans: 数据库名称
      pt_BR: Nome do banco
    placeholder:
      en_US: Database name
      zh_Hans: 数据库名称
      pt_BR: Database name


  # build_rag:
  #   type: boolean
  #   required: true
  #   label:
  #     en_US: Build RAG
  #     zh_Hans: 构建 RAG
  #     pt_BR: Build RAG
  #   placeholder:
  #     en_US: Build RAG
  #     zh_Hans: 构建 RAG
  #     pt_BR: Build RAG

  tables_name:
    type: text-input
    required: false
    label:
      en_US: Tables Name
      zh_Hans: 数据表名称
      pt_BR: Nomes das tabelas
    placeholder:
      en_US: Tables name(optional, multiple table names separated by commas)
      zh_Hans: 数据表名称(可选, 多个表名用逗号分隔)
      pt_BR: Nomes das tabelas (opcional; várias separadas por vírgula)

  kb_build_in_background:
    type: boolean
    required: false
    default: false
    label:
      en_US: Build schema KB in background
      zh_Hans: 后台构建知识库 schema
      pt_BR: Construir KB do schema em segundo plano
    help:
      en_US: If enabled, only the database connection is checked now; schema extraction and Dify upload run in a background thread. Save returns immediately — monitor plugin daemon logs for completion or errors (thread may stop if the plugin process exits).
      zh_Hans: 启用后仅立即校验数据库连接；schema 抽取与上传到 Dify 在后台线程执行。保存会马上成功——请在插件守护进程日志中查看完成或失败（若插件进程退出，线程可能中止）。
      pt_BR: Se ativo, só valida a ligação à BD agora; a extração do schema e o upload para o Dify correm em thread em segundo plano. O guardar devolve logo OK — acompanhe os logs do plugin-daemon para conclusão ou falhas (o processo pode encerrar a thread).

supported_app_types:
  - workflow
  - chatbot
tools:
  - tools/text2sql.yaml
  - tools/text2data.yaml
  - tools/sql_executer.yaml
  - tools/sql_executer_cust.yaml
  - tools/data_summary.yaml
  - tools/llm_plot.yaml
extra:
  python:
    source: provider/build_lm_db_schema_rag.py
    provider: LmDbSchemaRagProvider
