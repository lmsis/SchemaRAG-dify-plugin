identity:
  name: schema_kb_build
  author: lmsis
  label:
    en_US: Build schema knowledge base
    zh_Hans: 构建 schema 知识库
    pt_BR: Construir base de conhecimento do schema

description:
  human:
    en_US: Extract database schema and upload into a Dify knowledge base. Use the same Dataset ID field as Text to SQL (UUID from the knowledge base in Dify). Bind the Tool Provider credential from plugin setup. Output is only true or false.
    zh_Hans: 抽取数据库 schema 并上传到 Dify 知识库。Dataset ID 与 Text to SQL 相同（Dify 知识库 UUID）。节点绑定插件 Tool Provider 凭据。输出仅为 true 或 false。
    pt_BR: Extrai o schema da BD e envia para um dataset Dify. O campo **Dataset ID** é o **mesmo que no Text to SQL** (UUID da knowledge base no Dify). Associe a credencial do Tool Provider. Saída só **true** ou **false**.
  llm: Uploads database schema into a Dify dataset. Same dataset_id parameter semantics as Text2SQL. Returns only true or false.

parameters:
  - name: dataset_id
    type: string
    required: true
    label:
      en_US: Dataset ID
      zh_Hans: 知识库ID
      pt_BR: ID do dataset
    human_description:
      en_US: The ID of the Dify dataset containing the database schema. Supports multiple datasets separated by commas for comprehensive schema coverage.
      zh_Hans: 包含数据库架构的Dify知识库ID。支持逗号分隔的多个知识库ID以获得更全面的架构覆盖。
      pt_BR: ID do dataset Dify que contém o esquema do banco. Aceita vários IDs separados por vírgula para cobertura mais ampla do esquema.
    llm_description: The dataset ID from Dify knowledge base containing database schema information. Can accept multiple dataset IDs separated by commas (e.g., "dataset1,dataset2,dataset3") for retrieving from multiple knowledge bases concurrently.
    form: llm

extra:
  python:
    source: tools/schema_kb_build.py
