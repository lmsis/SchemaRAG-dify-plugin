identity:
  name: sql_executer
  author: joto
  label:
    en_US: SQL Executor
    zh_Hans: SQL 执行器
    pt_BR: Executor SQL

description:
  human:
    en_US: Execute SQL queries and get results from the database.
    zh_Hans: 执行 SQL 查询并从数据库获取结果。
    pt_BR: Executa consultas SQL e retorna resultados do banco de dados.
  llm: A tool that executes SQL queries against the configured database and returns the results in either JSON or Markdown format.

parameters:
  - name: sql
    type: string
    required: true
    label:
      en_US: SQL Query
      zh_Hans: SQL 查询
      pt_BR: Consulta SQL
    human_description:
      en_US: The SQL query to execute.
      zh_Hans: 要执行的 SQL 查询语句。
      pt_BR: A consulta SQL a ser executada.
    llm_description: The raw SQL query to be executed on the database.
    form: llm

  - name: output_format
    type: select
    required: true
    label:
      en_US: Output Format
      zh_Hans: 输出格式
      pt_BR: Formato de saída
    human_description:
      en_US: The format for the output results.
      zh_Hans: 输出结果的格式。
      pt_BR: Formato dos resultados de saída.
    llm_description: The desired format for the query results, either 'json' or 'md'.
    form: form
    options:
      - value: json
        label:
          en_US: JSON
          zh_Hans: JSON
          pt_BR: JSON
      - value: md
        label:
          en_US: Markdown
          zh_Hans: Markdown
          pt_BR: Markdown
    default: json

  - name: max_line
    type: number
    required: false
    label:
      en_US: Max rows
      zh_Hans: 最大行数
      pt_BR: Máximo de linhas
    human_description:
      en_US: Maximum number of rows to return (caps result size and memory use).
      zh_Hans: 要返回的最大行数。防止查询数据过多导致内存问题。
      pt_BR: Número máximo de linhas a retornar (limita tamanho e uso de memória).
    llm_description: The maximum number of lines to include in the query results.
    form: llm

  - name: ui_language
    type: select
    required: false
    label:
      en_US: Response language
      zh_Hans: 回复语言
      pt_BR: Idioma das mensagens
    human_description:
      en_US: Language for short status messages from this tool.
      zh_Hans: 此工具简短状态消息的语言。
      pt_BR: Idioma das mensagens curtas desta ferramenta.
    llm_description: Locale for user-visible messages (en_US, pt_BR, zh_Hans).
    form: form
    default: en_US
    options:
      - value: en_US
        label:
          en_US: English
          zh_Hans: 英语
          pt_BR: Inglês
      - value: pt_BR
        label:
          en_US: Portuguese (Brazil)
          zh_Hans: 葡萄牙语（巴西）
          pt_BR: Português (Brasil)
      - value: zh_Hans
        label:
          en_US: Chinese (Simplified)
          zh_Hans: 简体中文
          pt_BR: Chinês (simplificado)

extra:
  python:
    source: tools/sql_executer.py
