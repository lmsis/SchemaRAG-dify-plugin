identity:
  name: sql_executer_customize
  author: lmsis
  label:
    en_US: Custom SQL executor
    zh_Hans: SQL执行器(自定义)
    pt_BR: Executor SQL personalizado

description:
  human:
    en_US: Customize database connections and execute SQL queries to retrieve results.
    zh_Hans: 自定义数据库连接并执行SQL查询并从数据库获取结果。
    pt_BR: Personalize a conexão com o banco e execute consultas SQL para obter resultados.
  llm: A tool that executes SQL queries against the configured database and returns the results in either JSON or Markdown format.

parameters:
  - name: database_url
    type: string
    required: true
    label:
      en_US: Database URL
      zh_Hans: 数据库URL
      pt_BR: URL do banco
    human_description:
      en_US: The database connection URL example:mysql://user:password@host:port/dbname db_type can be:postgresql, dameng, mssql, oracle.
      zh_Hans: 数据库连接URL 例如：mysql://user:password@host:port/dbname db_type 可为：postgresql，dameng，mssql，oracle。
      pt_BR: URL de conexão (ex.: mysql://usuario:senha@host:porta/nome_db). Tipos suportados incluem postgresql, dameng, mssql, oracle.
    llm_description: The connection URL for the database to execute queries against.
    form: llm

  - name: sql
    type: string
    required: true
    label:
      en_US: SQL Query
      zh_Hans: SQL查询
      pt_BR: Consulta SQL
    human_description:
      en_US: The SQL query to execute.
      zh_Hans: 要执行的SQL查询语句。
      pt_BR: A consulta SQL a ser executada.
    llm_description: The raw SQL query to be executed on the database.
    form: llm

  - name: output_format
    type: select
    required: true
    label:
      en_US: Output Format
      zh_Hans: 输出格式
      pt_BR: Formato de saída
    human_description:
      en_US: The format for the output results.
      zh_Hans: 输出结果的格式。
      pt_BR: Formato dos resultados (JSON ou Markdown).
    llm_description: The desired format for the query results, either 'json' or 'md'.
    form: form
    options:
      - value: json
        label:
          en_US: JSON
          zh_Hans: JSON
          pt_BR: JSON
      - value: md
        label:
          en_US: Markdown
          zh_Hans: Markdown
          pt_BR: Markdown
    default: json
    
  - name: max_line
    type: number
    required: false
    label:
      en_US: Max rows
      zh_Hans: 最大行数
      pt_BR: Máximo de linhas
    human_description:
      en_US: Maximum number of rows to return.
      zh_Hans: 要返回的最大行数。防止查询数据过多导致内存问题。
      pt_BR: Número máximo de linhas a retornar (evita uso excessivo de memória).
    llm_description: The maximum number of lines to include in the query results.
    form: llm

  - name: ui_language
    type: select
    required: false
    label:
      en_US: Response language
      zh_Hans: 回复语言
      pt_BR: Idioma das mensagens
    human_description:
      en_US: Language for short status messages from this tool.
      zh_Hans: 此工具简短状态消息的语言。
      pt_BR: Idioma das mensagens curtas desta ferramenta.
    llm_description: Locale for user-visible messages (en_US, pt_BR, zh_Hans).
    form: form
    default: en_US
    options:
      - value: en_US
        label:
          en_US: English
          zh_Hans: 英语
          pt_BR: Inglês
      - value: pt_BR
        label:
          en_US: Portuguese (Brazil)
          zh_Hans: 葡萄牙语（巴西）
          pt_BR: Português (Brasil)
      - value: zh_Hans
        label:
          en_US: Chinese (Simplified)
          zh_Hans: 简体中文
          pt_BR: Chinês (simplificado)

extra:
  python:
    source: tools/sql_executer_cust.py
