identity:
  name: text2data
  author: lmsis
  label:
    en_US: Text to Data
    zh_Hans: 文本转数据
    pt_BR: Texto para dados
    icon: logo.jpg
 
description:
  human:
    en_US: Convert natural language questions to data queries using database schema knowledge base
    zh_Hans: 使用数据库架构知识库将自然语言问题转换为数据查询
    pt_BR: Converte perguntas em linguagem natural em consultas de dados usando a base de conhecimento do esquema
  llm: A tool that converts natural language questions to data queries by retrieving relevant schema information from a knowledge base and using LLM to generate SQL

parameters:
  - name: dataset_id
    type: string
    required: true
    label:
      en_US: Dataset ID
      zh_Hans: 知识库ID
      pt_BR: ID do dataset
    human_description:
      en_US: The ID of the Dify dataset containing the database schema. Supports multiple datasets separated by commas for comprehensive schema coverage.
      zh_Hans: 包含数据库架构的Dify知识库ID。支持逗号分隔的多个知识库ID以获得更全面的架构覆盖。
      pt_BR: ID do dataset Dify que contém o esquema do banco. Aceita vários IDs separados por vírgula.
    llm_description: The dataset ID from Dify knowledge base containing database schema information. Can accept multiple dataset IDs separated by commas (e.g., "dataset1,dataset2,dataset3") for retrieving from multiple knowledge bases concurrently.
    form: llm

  - name: llm
    type: model-selector
    scope: llm
    required: true
    label:
      en_US: LLM Model
      zh_Hans: 大语言模型
      pt_BR: Modelo de LLM
    human_description:
      en_US: The large language model to use for SQL generation
      zh_Hans: 用于生成SQL的大语言模型
      pt_BR: Modelo de linguagem grande (LLM) usado para gerar SQL
    llm_description: The LLM model to use for generating SQL queries
    form: form

  - name: content
    type: string
    required: true
    label:
      en_US: Question
      zh_Hans: 问题
      pt_BR: Pergunta
    human_description:
      en_US: The natural language question to convert to SQL
      zh_Hans: 要转换为SQL的自然语言问题
      pt_BR: Pergunta em linguagem natural a ser convertida em SQL
    llm_description: The natural language question that needs to be converted to SQL query
    form: llm

  - name: dialect
    type: select
    required: true
    label:
      en_US: SQL Dialect
      zh_Hans: SQL方言
      pt_BR: Dialeto SQL
    human_description:
      en_US: The SQL dialect to use for query generation
      zh_Hans: 用于查询生成的SQL方言
      pt_BR: Dialeto SQL usado para gerar a consulta
    llm_description: The SQL dialect (MySQL or PostgreSQL) to use for generating the query
    form: form
    options:
      - value: mysql
        label:
          en_US: MySQL
          zh_Hans: MySQL
          pt_BR: MySQL
      - value: postgresql
        label:
          en_US: PostgreSQL
          zh_Hans: PostgreSQL
          pt_BR: PostgreSQL
      - value: mssql
        label:
          en_US: Microsoft SQL Server
          zh_Hans: Microsoft SQL Server
          pt_BR: Microsoft SQL Server
      - value: oracle
        label:
          en_US: Oracle
          zh_Hans: Oracle
          pt_BR: Oracle
      - value: dameng
        label:
          en_US: Dameng
          zh_Hans: 达梦数据库
          pt_BR: Dameng
    default: mysql

  - name: top_k
    type: number
    required: false
    label:
      en_US: Top K Results
      zh_Hans: 检索结果数量
      pt_BR: Número de resultados (top K)
    human_description:
      en_US: Number of top results to retrieve from knowledge base
      zh_Hans: 从知识库检索的结果数量
      pt_BR: Quantidade de melhores resultados a recuperar da base de conhecimento
    llm_description: The number of top results to retrieve from the knowledge base for schema information
    form: form
    default: 5
    min: 1
    max: 20

  - name: retrieval_model
    type: select
    required: false
    label:
      en_US: Retrieval Method
      zh_Hans: 检索方法
      pt_BR: Método de recuperação
    human_description:
      en_US: The retrieval method to use for searching the knowledge base
      zh_Hans: 用于搜索知识库的检索方法
      pt_BR: Método de busca na base de conhecimento
    llm_description: The retrieval method to use for searching relevant schema information
    form: form
    options:
      - value: keyword_search
        label:
          en_US: Keyword Search
          zh_Hans: 关键字检索
          pt_BR: Busca por palavra-chave
      - value: semantic_search
        label:
          en_US: Semantic Search
          zh_Hans: 语义检索
          pt_BR: Busca semântica
      - value: full_text_search
        label:
          en_US: Full Text Search
          zh_Hans: 全文检索
          pt_BR: Busca em texto completo
      - value: hybrid_search
        label:
          en_US: Hybrid Search
          zh_Hans: 混合检索
          pt_BR: Busca híbrida
    default: semantic_search

  - name: example_dataset_id
    type: string
    required: false
    label:
      en_US: Example Dataset ID
      zh_Hans: 示例知识库ID
      pt_BR: ID do dataset de exemplos
    human_description:
      en_US: The ID of the Dify dataset containing SQL examples. Supports multiple datasets separated by commas for comprehensive example coverage.
      zh_Hans: 包含SQL示例的Dify知识库ID。支持逗号分隔的多个知识库ID以获得更全面的示例覆盖。
      pt_BR: ID do dataset Dify com exemplos de SQL. Aceita vários IDs separados por vírgula.
    llm_description: Optional dataset ID from Dify knowledge base containing SQL examples that will be retrieved and added to the prompt to improve SQL generation accuracy. Can accept multiple dataset IDs separated by commas.
    form: llm
    placeholder:
      en_US: "e.g., examples_dataset_1,examples_dataset_2"
      zh_Hans: "例如：examples_dataset_1,examples_dataset_2"
      pt_BR: "Ex.: examples_dataset_1,examples_dataset_2"

  - name: output_format
    type: select
    required: true
    label:
      en_US: Output Format
      zh_Hans: 输出格式
      pt_BR: Formato de saída
    human_description:
      en_US: The format for the output results.
      zh_Hans: 输出结果的格式。
      pt_BR: Formato dos resultados retornados (JSON, Markdown ou resumo).
    llm_description: The desired format for the query results, either 'json' or 'md'.
    form: form
    options:
      - value: json
        label:
          en_US: JSON
          zh_Hans: JSON
          pt_BR: JSON
      - value: md
        label:
          en_US: Markdown
          zh_Hans: Markdown
          pt_BR: Markdown
      - value: summary
        label:
          en_US: Summary
          zh_Hans: 摘要
          pt_BR: Resumo
    default: json

  - name: max_rows
    type: number
    required: false
    label:
      en_US: Max Rows
      zh_Hans: 最大行数
      pt_BR: Máximo de linhas
    human_description:
      en_US: Maximum number of rows to return (default 500, prevents excessive data)
      zh_Hans: 返回的最大行数（默认500，防止返回过多数据）
      pt_BR: Número máximo de linhas a retornar (padrão 500, evita volume excessivo)
    llm_description: The maximum number of rows to return from the query results to prevent excessive data transfer
    form: form
    default: 500
    min: 1
    max: 10000

  - name: enable_refiner
    type: select
    required: false
    label:
      en_US: Enable SQL Refiner
      zh_Hans: 启用SQL自动修复
      pt_BR: Ativar refinador de SQL
    human_description:
      en_US: Automatically fix SQL errors using LLM-based refinement (experimental feature)
      zh_Hans: 使用基于LLM的自动修复功能来修复SQL错误（实验性功能）
      pt_BR: Corrige erros de SQL automaticamente com refinamento assistido por LLM (recurso experimental)
    llm_description: Enable automatic SQL error correction through iterative refinement with LLM feedback
    form: form
    options:
      - value: "true"
        label:
          en_US: Enable
          zh_Hans: 启用
          pt_BR: Ativar
      - value: "false"
        label:
          en_US: Disable
          zh_Hans: 禁用
          pt_BR: Desativar
    default: "false"

  - name: max_refine_iterations
    type: number
    required: false
    label:
      en_US: Max Refine Iterations
      zh_Hans: 最大修复次数
      pt_BR: Máx. iterações de refinamento
    human_description:
      en_US: Maximum number of attempts to refine and fix SQL errors (default 3)
      zh_Hans: 修复SQL错误的最大尝试次数（默认3次）
      pt_BR: Número máximo de tentativas para corrigir o SQL (padrão 3)
    llm_description: The maximum number of iterations for SQL error correction before giving up
    form: form
    default: 3
    min: 1
    max: 5

  - name: ui_language
    type: select
    required: false
    label:
      en_US: Response language
      zh_Hans: 回复语言
      pt_BR: Idioma das mensagens
    human_description:
      en_US: Language for status messages in the chat (SQL steps, execution result, refiner, empty result).
      zh_Hans: 聊天中状态消息的语言（SQL 步骤、执行结果、自动修复、空结果等）。
      pt_BR: Idioma das mensagens de status no chat (etapas SQL, resultado, refinador, resultado vazio).
    llm_description: Locale for user-visible tool messages. One of en_US, pt_BR, zh_Hans.
    form: form
    default: en_US
    options:
      - value: en_US
        label:
          en_US: English
          zh_Hans: 英语
          pt_BR: Inglês
      - value: pt_BR
        label:
          en_US: Portuguese (Brazil)
          zh_Hans: 葡萄牙语（巴西）
          pt_BR: Português (Brasil)
      - value: zh_Hans
        label:
          en_US: Chinese (Simplified)
          zh_Hans: 简体中文
          pt_BR: Chinês (simplificado)

extra:
  python:
    source: tools/text2data.py
